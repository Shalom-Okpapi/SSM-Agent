name: SMM Agent - Telegram Summary

on:
  schedule:
    - cron: '0 8 * * 1'   # Every Monday 8 AM UTC
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Run Agent Summary
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -c '
import os
from openai import OpenAI
import requests
client = OpenAI(base_url="https://integrate.api.nvidia.com/v1", api_key=os.getenv("NVIDIA_API_KEY"))
res = client.chat.completions.create(model="meta/llama-3.1-70b-instruct", messages=[{"role":"system","content":"Expert SMM..."}, {"role":"user","content":"Send a quick daily SMM tip or summary"}])
msg = res.choices[0].message.content
requests.post(f"https://api.telegram.org/bot{os.getenv("TELEGRAM_BOT_TOKEN")}/sendMessage", json={"chat_id": os.getenv("TELEGRAM_CHAT_ID"), "text": msg, "parse_mode": "Markdown"})
print("Summary sent!")
'
